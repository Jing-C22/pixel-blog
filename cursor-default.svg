import { parseFrontmatter } from "./frontmatter";
import type { Post, ZoneConfig, ZoneId } from "./types";

// Vite loads all post markdown as raw strings at build time — no runtime fetch needed.
const postModules = import.meta.glob("./posts/*.md", {
  query: "?raw",
  import: "default",
  eager: true,
}) as Record<string, string>;

function slugFromPath(path: string): string {
  const file = path.split("/").pop() ?? path;
  return file.replace(/\.md$/, "");
}

export const posts: Post[] = Object.entries(postModules)
  .map(([path, raw]) => {
    const { data, content } = parseFrontmatter(raw);
    return {
      slug: slugFromPath(path),
      title: data.title ?? "Untitled",
      date: data.date ?? "",
      zone: (data.zone ?? "hut") as ZoneId,
      icon: data.icon ?? "📄",
      excerpt: data.excerpt ?? "",
      content: content.trim(),
    } satisfies Post;
  })
  .sort((a, b) => (a.date < b.date ? 1 : -1));

export function getPostsByZone(zone: string): Post[] {
  return posts.filter((p) => p.zone === zone);
}

export function getPost(slug: string): Post | undefined {
  return posts.find((p) => p.slug === slug);
}

